name: Deploy Docs to GitHub Pages
on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install docs dependencies
        working-directory: docs-site
        run: npm ci
      - name: Copy library source
        run: cp src/MathEditor.tsx src/MathRenderer.tsx src/SymbolPalette.tsx src/QuestionForm.tsx src/symbols.ts src/styles.css docs-site/src/
      - name: Build docs
        working-directory: docs-site
        run: npx next build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
